<!doctype html>
<html>
  <head>
    <title>Caro Lobby</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 100px;
      }
      button {
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
      }
      #joinPopup {
        display: none;
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: 1px solid #ccc;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Caro Game</h1>

    <button onclick="createRoom()">Tạo phòng</button>
    <button onclick="showJoin()">Join phòng</button>

    <div id="joinPopup">
      <h3>Nhập mã phòng</h3>
      <input id="roomInput" placeholder="Room ID" />
      <br /><br />
      <button onclick="joinRoom()">Join</button>
      <button onclick="hideJoin()">Cancel</button>
    </div>

    <script>
      function showJoin() {
        document.getElementById("joinPopup").style.display = "block";
      }

      function hideJoin() {
        document.getElementById("joinPopup").style.display = "none";
      }

      async function createRoom() {
        const res = await fetch("/api/rooms/create", { method: "POST" });
        const room = await res.json();

        window.location.href = "/room?roomId=" + room.id;
      }

      async function joinRoom() {
        const roomId = document.getElementById("roomInput").value;

        const res = await fetch("/api/rooms/join/" + roomId, {
          method: "POST",
        });

        if (res.ok) {
          window.location.href = "/room?roomId=" + roomId;
        } else {
          alert("Không join được!");
        }
      }
    </script>
  </body>
</html>
