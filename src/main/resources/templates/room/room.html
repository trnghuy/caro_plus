<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Room</title>
    <style>
      body {
        text-align: center;
        font-family: Arial;
      }
      .container {
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }
      .player {
        width: 200px;
        height: 150px;
        border: 2px solid black;
        margin: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      button {
        padding: 10px 20px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h2>Room</h2>

    <div class="container">
      <div class="player" id="player1">Player 1</div>
      <div class="player" id="player2">Waiting...</div>
    </div>

    <button onclick="startGame()">Chơi</button>

    <button onclick="leaveRoom()">Rời phòng</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script th:inline="javascript">
      /*<![CDATA[*/
      // Cách viết này giúp JavaScript không bị lỗi syntax khi bạn code ở VS Code
      // Nhưng khi chạy, Thymeleaf sẽ tự động thay thế giá trị vào
      const currentUsername = /*[[${user.username}]]*/ "guest";
      const roomId = /*[[${roomId}]]*/ 0;
      /*]]>*/
    </script>

    <script>
      let stompClient = null;
      // const urlParams = new URLSearchParams(window.location.search);
      // const roomId = urlParams.get("roomId");

      function connectWebSocket() {
        const socket = new SockJS("/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect(
          {},
          function (frame) {
            console.log("Connected: " + frame);

            // Đăng ký kênh hóng tin của phòng này
            stompClient.subscribe("/topic/room/" + roomId, function (response) {
              const message = JSON.parse(response.body);

              if (message.type === "JOIN" || message.type === "LEAVE") {
                // Có người vào hoặc ra -> Tải lại thông tin phòng để cập nhật tên
                setTimeout(loadRoom, 150);
              }

              if (message.type === "START") {
                // Nếu chủ phòng bấm Play, tất cả cùng chuyển sang màn hình Game
                window.location.href = "/game?roomId=" + roomId;
              }
            });

            // Không cần gửi JOIN nữa vì server đã gửi khi joinRoom
          },
          function (error) {
            console.log("Lỗi kết nối WS: " + error);
          },
        );
      }

      async function loadRoom() {
        const res = await fetch("/api/rooms/" + roomId + "?t=" + Date.now(), {
          cache: "no-store",
        });
        const room = await res.json();

        document.getElementById("player1").innerText = room.host
          ? room.host.username + " (X)"
          : "Waiting...";

        document.getElementById("player2").innerText = room.player2
          ? room.player2.username + " (O)"
          : "Waiting...";
      }

      // Sửa lại hàm startGame của bạn một chút
      async function startGame() {
        const res = await fetch("/api/rooms/start/" + roomId, {
          method: "POST",
        });
        if (res.ok) {
          // Server sẽ gửi WebSocket message "START"
        } else {
          alert("Chưa đủ người!");
        }
      }

      async function leaveRoom() {
        const res = await fetch("/api/rooms/leave/" + roomId, {
          method: "POST",
        });

        if (res.ok) {
          window.location.href = "/home";
        } else {
          alert("Có lỗi khi rời khỏi phòng!");
        }
      }

      // Khởi tạo
      loadRoom();
      connectWebSocket();
    </script>
  </body>
</html>
