<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Room</title>
    <style>
      body {
        text-align: center;
        font-family: Arial;
      }
      .container {
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }
      .player {
        width: 200px;
        height: 150px;
        border: 2px solid black;
        margin: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      button {
        padding: 10px 20px;
        margin-top: 20px;
      }
      .chat-box {
        max-width: 700px;
        margin: 30px auto 0;
        text-align: left;
      }
      .chat-messages {
        border: 1px solid #ccc;
        height: 220px;
        overflow-y: auto;
        padding: 10px;
        margin-bottom: 10px;
      }
      .chat-message {
        margin-bottom: 10px;
      }
      .chat-input {
        display: flex;
        gap: 10px;
      }
      .chat-input input {
        flex: 1;
        padding: 8px;
      }
      .chat-meta {
        font-size: 12px;
        color: #666;
      }
      .system-message {
        color: #666;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h2>Room</h2>
    <div id="roomData"
         th:attr="data-room-id=${roomId},data-user-id=${user.id},data-username=${user.username}"></div>

    <div class="container">
      <div class="player" id="player1">Player 1</div>
      <div class="player" id="player2">Waiting...</div>
    </div>

    <button onclick="startGame()">Play</button>

    <button onclick="leaveRoom()">Leave</button>

    <div class="chat-box">
      <h3>Room Chat</h3>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" maxlength="500" placeholder="Nhập tin nhắn..." />
        <button onclick="sendChatMessage()">Gửi</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>
      const roomData = document.getElementById("roomData");
      const roomId = roomData.dataset.roomId || new URLSearchParams(window.location.search).get("roomId");
      const currentUserId = roomData.dataset.userId;
      let chatClient = null;
      const renderedMessageIds = new Set();

      async function loadRoom() {
        const res = await fetch("/api/rooms/" + roomId);
        if (!res.ok) {
          console.error("Không tải được thông tin phòng");
          return;
        }
        const room = await res.json();

        document.getElementById("player1").innerText = room.host
          ? room.host.username + " (X)"
          : "Waiting...";

        document.getElementById("player2").innerText = room.player2
          ? room.player2.username + " (O)"
          : "Waiting...";
      }

      async function startGame() {
        const res = await fetch("/api/rooms/start/" + roomId, {
          method: "POST",
        });

        if (res.ok) {
          window.location.href = "/game?roomId=" + roomId;
        } else {
          alert("Chưa đủ người!");
        }
      }

      async function leaveRoom() {
        const res = await fetch("/api/rooms/leave/" + roomId, {
          method: "POST",
        });

        if (res.ok) {
          window.location.href = "/home";
        } else {
          alert("Có lỗi khi rời khỏi phòng!");
        }
      }

      async function loadChatMessages() {
        try {
          const res = await fetch("/api/rooms/" + roomId + "/messages");
          if (!res.ok) {
            console.error("Không tải được lịch sử chat");
            return;
          }

          const messages = await res.json();
          const container = document.getElementById("chatMessages");
          messages.forEach(renderChatMessage);
          container.scrollTop = container.scrollHeight;
        } catch (error) {
          console.error("Lỗi tải chat:", error);
        }
      }

      function connectChat() {
        const socket = new SockJS("/ws");
        chatClient = Stomp.over(socket);
        chatClient.debug = null;

        chatClient.connect({}, function () {
          chatClient.subscribe("/topic/rooms/" + roomId + "/chat", function (frame) {
            renderChatMessage(JSON.parse(frame.body));
            const container = document.getElementById("chatMessages");
            container.scrollTop = container.scrollHeight;
          });
        }, function (error) {
          console.error("Kết nối chat thất bại:", error);
        });
      }

      async function sendChatMessage() {
        const input = document.getElementById("chatInput");
        const content = input.value.trim();

        if (!content) {
          return;
        }

        try {
          const res = await fetch("/api/rooms/" + roomId + "/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              senderId: Number(currentUserId),
              content: content
            })
          });

          if (!res.ok) {
            console.error("Gửi chat thất bại");
            return;
          }

          const message = await res.json();
          renderChatMessage(message);
        } catch (error) {
          console.error("Lỗi gửi chat:", error);
          return;
        }

        input.value = "";
        const container = document.getElementById("chatMessages");
        container.scrollTop = container.scrollHeight;
      }

      function renderChatMessage(message) {
        if (!message || !message.id || renderedMessageIds.has(message.id)) {
          return;
        }

        renderedMessageIds.add(message.id);
        const container = document.getElementById("chatMessages");
        const item = document.createElement("div");

        if (message.type === "SYSTEM") {
          item.className = "chat-message system-message";
          item.textContent = "[SYSTEM] " + message.content;
        } else {
          item.className = "chat-message";
          item.innerHTML =
            "<strong>" + escapeHtml(message.senderUsername || "Unknown") + ":</strong> " +
            escapeHtml(message.content || "") +
            '<div class="chat-meta">' + formatTime(message.createdAt) + "</div>";
        }

        container.appendChild(item);
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function formatTime(value) {
        if (!value) return "";
        return new Date(value).toLocaleString();
      }

      document.getElementById("chatInput").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          sendChatMessage();
        }
      });

      loadRoom();
      loadChatMessages();
      connectChat();
      setInterval(loadRoom, 2000);
      setInterval(loadChatMessages, 2000);
    </script>
  </body>
</html>
