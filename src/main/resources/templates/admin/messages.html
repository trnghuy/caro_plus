<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caro Online | Admin Messages</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" href="/css/admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-app">
      <div th:replace="~{admin/fragments/sidebar :: sidebar(${activePage}, ${adminUser})}"></div>
      <main class="admin-workspace">
        <div th:replace="~{admin/fragments/topbar :: topbar(${pageTitle})}"></div>
        <div class="admin-workspace-scroll">
          <div th:replace="~{admin/fragments/flash :: flashMessages}"></div>

          <section class="admin-surface">
            <div class="admin-panel-head">
              <div>
                <p class="admin-section-tag">Chat</p>
                <h2 class="admin-panel-title">Tin nhắn phòng chờ và trong trận</h2>
              </div>
            </div>

            <form class="admin-filter-grid admin-filter-grid--messages" method="get" th:action="@{/admin/messages}">
              <input class="input" type="text" name="messageQ" th:value="${messageQ}" placeholder="Tìm theo tên người gửi hoặc nội dung" />
              <input class="input" type="number" min="1" name="messageRoomId" th:value="${messageRoomId}" placeholder="Room id" />
              <button class="btn btn-primary" type="submit">Lọc</button>
            </form>

            <div class="admin-table-shell">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Người gửi</th>
                    <th>Room</th>
                    <th>Loại</th>
                    <th>Nội dung</th>
                    <th>Thời gian</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:if="${messages.isEmpty()}"><td class="empty-cell" colspan="7">Không có tin nhắn phù hợp bộ lọc.</td></tr>
                  <tr th:each="messageItem : ${messages.content}">
                    <td th:text="${messageItem.id}">1</td>
                    <td th:text="${messageItem.sender != null ? messageItem.sender.username : '-'}">sender</td>
                    <td th:text="${messageItem.room != null ? messageItem.room.id : '-'}">1</td>
                    <td><span class="badge" th:text="${messageItem.type}">CHAT</span></td>
                    <td><div class="admin-cell-text" th:text="${messageItem.content}">content</div></td>
                    <td th:text="${messageItem.createdAt != null ? #dates.format(messageItem.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                    <td>
                      <form class="inline-form" method="post" th:action="@{'/admin/messages/' + ${messageItem.id} + '/delete'}">
                        <button class="btn btn-danger btn--compact" type="submit" data-confirm="Xóa tin nhắn này khỏi hệ thống?">Xóa</button>
                      </form>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="admin-pagination">
              <span th:text="|Trang ${messages.number + 1}/${messages.totalPages == 0 ? 1 : messages.totalPages}|">Trang 1</span>
              <div class="admin-pagination-actions">
                <a class="btn btn-secondary btn--compact" th:if="${messages.hasPrevious()}" th:href="@{/admin/messages(messagePage=${messages.number - 1},messageQ=${messageQ},messageRoomId=${messageRoomId})}">Trang trước</a>
                <a class="btn btn-secondary btn--compact" th:if="${messages.hasNext()}" th:href="@{/admin/messages(messagePage=${messages.number + 1},messageQ=${messageQ},messageRoomId=${messageRoomId})}">Trang sau</a>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div id="confirmOverlay" class="admin-confirm-overlay" hidden>
      <div class="admin-confirm-card">
        <h3 class="modal-title">Xác nhận thao tác</h3>
        <p id="confirmMessage" class="modal-copy">Bạn có chắc muốn tiếp tục?</p>
        <div class="modal-actions modal-actions--center">
          <button id="confirmCancelButton" class="btn btn-secondary" type="button">Hủy</button>
          <button id="confirmSubmitButton" class="btn btn-primary" type="button">Xác nhận</button>
        </div>
      </div>
    </div>
    <script src="/js/admin.js"></script>
  </body>
</html>
