<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caro Online | Admin Games</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" href="/css/admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-app">
      <div th:replace="~{admin/fragments/sidebar :: sidebar(${activePage}, ${adminUser})}"></div>
      <main class="admin-workspace">
        <div th:replace="~{admin/fragments/topbar :: topbar(${pageTitle})}"></div>
        <div class="admin-workspace-scroll">
          <div th:replace="~{admin/fragments/flash :: flashMessages}"></div>

          <section class="admin-surface">
            <div class="admin-panel-head">
              <div>
                <p class="admin-section-tag">Trận đấu</p>
                <h2 class="admin-panel-title">Lịch sử và các trận đang diễn ra</h2>
              </div>
            </div>

            <form class="admin-filter-grid admin-filter-grid--games" method="get" th:action="@{/admin/games}">
              <input class="input" type="text" name="gameQ" th:value="${gameQ}" placeholder="Tìm theo game id, room id hoặc tên người chơi" />
              <select class="input" name="gameStatus">
                <option value="">Tất cả trạng thái</option>
                <option value="PLAYING" th:selected="${gameStatus == 'PLAYING'}">PLAYING</option>
                <option value="FINISHED" th:selected="${gameStatus == 'FINISHED'}">FINISHED</option>
                <option value="ABANDONED" th:selected="${gameStatus == 'ABANDONED'}">ABANDONED</option>
              </select>
              <button class="btn btn-primary" type="submit">Lọc</button>
            </form>

            <div class="admin-table-shell">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Game</th>
                    <th>Room</th>
                    <th>Player X</th>
                    <th>Player O</th>
                    <th>Kết quả</th>
                    <th>Trạng thái</th>
                    <th>Thời gian</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:if="${games.isEmpty()}"><td class="empty-cell" colspan="8">Không có trận phù hợp bộ lọc.</td></tr>
                  <tr th:each="game : ${games.content}">
                    <td th:text="${game.id}">1</td>
                    <td th:text="${game.room != null ? game.room.id : '-'}">1</td>
                    <td th:text="${game.playerX != null ? game.playerX.username : '-'}">X</td>
                    <td th:text="${game.playerO != null ? game.playerO.username : '-'}">O</td>
                    <td th:text="${game.winner != null ? game.winner.username : ('FINISHED'.equals(game.status) ? 'Hòa' : '-')}">-</td>
                    <td><span class="badge" th:text="${game.status}">PLAYING</span></td>
                    <td th:text="${game.createdAt != null ? #dates.format(game.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                    <td>
                      <div class="admin-action-wrap">
                        <a class="btn btn-secondary btn--compact" th:href="@{'/admin/games/' + ${game.id}}">Chi tiết</a>
                        <form class="inline-form" method="post" th:action="@{'/admin/games/' + ${game.id} + '/cancel'}" th:if="${game.status != 'FINISHED'}">
                          <button class="btn btn-secondary btn--compact" type="submit" data-confirm="Hủy trận lỗi này và đánh dấu abandoned?">Hủy trận</button>
                        </form>
                        <form class="inline-form" method="post" th:action="@{'/admin/games/' + ${game.id} + '/delete'}" th:if="${game.status != 'FINISHED'}">
                          <button class="btn btn-danger btn--compact" type="submit" data-confirm="Xóa trận chưa hoàn tất này?">Xóa</button>
                        </form>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="admin-pagination">
              <span th:text="|Trang ${games.number + 1}/${games.totalPages == 0 ? 1 : games.totalPages}|">Trang 1</span>
              <div class="admin-pagination-actions">
                <a class="btn btn-secondary btn--compact" th:if="${games.hasPrevious()}" th:href="@{/admin/games(gamePage=${games.number - 1},gameQ=${gameQ},gameStatus=${gameStatus})}">Trang trước</a>
                <a class="btn btn-secondary btn--compact" th:if="${games.hasNext()}" th:href="@{/admin/games(gamePage=${games.number + 1},gameQ=${gameQ},gameStatus=${gameStatus})}">Trang sau</a>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div id="confirmOverlay" class="admin-confirm-overlay" hidden>
      <div class="admin-confirm-card">
        <h3 class="modal-title">Xác nhận thao tác</h3>
        <p id="confirmMessage" class="modal-copy">Bạn có chắc muốn tiếp tục?</p>
        <div class="modal-actions modal-actions--center">
          <button id="confirmCancelButton" class="btn btn-secondary" type="button">Hủy</button>
          <button id="confirmSubmitButton" class="btn btn-primary" type="button">Xác nhận</button>
        </div>
      </div>
    </div>
    <script src="/js/admin.js"></script>
  </body>
</html>
