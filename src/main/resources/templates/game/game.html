<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Caro Game</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
      }

      #board {
        display: grid;
        grid-template-columns: repeat(20, 30px);
        justify-content: center;
        margin-top: 20px;
      }

      .cell {
        width: 30px;
        height: 30px;
        border: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .chat-box {
        max-width: 700px;
        margin: 30px auto 0;
        text-align: left;
      }

      .chat-messages {
        border: 1px solid #ccc;
        height: 220px;
        overflow-y: auto;
        padding: 10px;
        margin-bottom: 10px;
      }

      .chat-message {
        margin-bottom: 10px;
      }

      .chat-input {
        display: flex;
        gap: 10px;
      }

      .chat-input input {
        flex: 1;
        padding: 8px;
      }

      .chat-meta {
        font-size: 12px;
        color: #666;
      }

      .system-message {
        color: #666;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h2>Game</h2>
    <div id="turn">Turn: X</div>
    <div id="gameData"
         th:attr="data-room-id=${roomId},data-user-id=${user.id},data-username=${user.username}"></div>

    <div id="board"></div>

    <div class="chat-box">
      <h3>In-Game Chat</h3>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" maxlength="500" placeholder="Nhập tin nhắn..." />
        <button onclick="sendChatMessage()">Gửi</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script>
      const gameData = document.getElementById("gameData");
      const roomId = gameData.dataset.roomId || new URLSearchParams(window.location.search).get("roomId");
      const currentUserId = gameData.dataset.userId;
      const renderedMessageIds = new Set();

      let board = Array(20)
        .fill(null)
        .map(() => Array(20).fill(null));
      let currentPlayer = "X";
      let stompClient = null;

      function connectWS() {
        const socket = new SockJS("/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
          stompClient.subscribe("/topic/game/" + roomId, function (msg) {
            const data = JSON.parse(msg.body);

            board[data.x][data.y] = data.player;
            currentPlayer = data.player === "X" ? "O" : "X";

            updateTurn();
            renderBoard();
          });

          stompClient.subscribe("/topic/rooms/" + roomId + "/chat", function (frame) {
            renderChatMessage(JSON.parse(frame.body));
            const container = document.getElementById("chatMessages");
            container.scrollTop = container.scrollHeight;
          });
        }, function (error) {
          console.error("Kết nối websocket thất bại:", error);
        });
      }

      function sendMove(x, y) {
        if (board[x][y]) return;

        stompClient.send(
          "/app/move",
          {},
          JSON.stringify({
            roomId: roomId,
            x: x,
            y: y,
            player: currentPlayer,
          }),
        );
      }

      async function loadChatMessages() {
        try {
          const res = await fetch("/api/rooms/" + roomId + "/messages");
          if (!res.ok) {
            console.error("Không tải được lịch sử chat");
            return;
          }

          const messages = await res.json();
          const container = document.getElementById("chatMessages");
          messages.forEach(renderChatMessage);
          container.scrollTop = container.scrollHeight;
        } catch (error) {
          console.error("Lỗi tải chat:", error);
        }
      }

      async function sendChatMessage() {
        const input = document.getElementById("chatInput");
        const content = input.value.trim();

        if (!content) {
          return;
        }

        try {
          const res = await fetch("/api/rooms/" + roomId + "/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              senderId: Number(currentUserId),
              content: content
            }),
          });

          if (!res.ok) {
            console.error("Gửi chat thất bại");
            return;
          }

          const message = await res.json();
          renderChatMessage(message);
        } catch (error) {
          console.error("Lỗi gửi chat:", error);
          return;
        }

        input.value = "";
        const container = document.getElementById("chatMessages");
        container.scrollTop = container.scrollHeight;
      }

      function renderChatMessage(message) {
        if (!message || !message.id || renderedMessageIds.has(message.id)) {
          return;
        }

        renderedMessageIds.add(message.id);
        const container = document.getElementById("chatMessages");
        const item = document.createElement("div");

        if (message.type === "SYSTEM") {
          item.className = "chat-message system-message";
          item.textContent = "[SYSTEM] " + message.content;
        } else {
          item.className = "chat-message";
          item.innerHTML =
            "<strong>" + escapeHtml(message.senderUsername || "Unknown") + ":</strong> " +
            escapeHtml(message.content || "") +
            '<div class="chat-meta">' + formatTime(message.createdAt) + "</div>";
        }

        container.appendChild(item);
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function formatTime(value) {
        if (!value) return "";
        return new Date(value).toLocaleString();
      }

      function renderBoard() {
        const boardDiv = document.getElementById("board");
        boardDiv.innerHTML = "";

        for (let i = 0; i < 20; i++) {
          for (let j = 0; j < 20; j++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerText = board[i][j] || "";
            cell.onclick = () => sendMove(i, j);
            boardDiv.appendChild(cell);
          }
        }
      }

      function updateTurn() {
        document.getElementById("turn").innerText = "Turn: " + currentPlayer;
      }

      document.getElementById("chatInput").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          sendChatMessage();
        }
      });

      connectWS();
      renderBoard();
      loadChatMessages();
      setInterval(loadChatMessages, 2000);
    </script>
  </body>
</html>
