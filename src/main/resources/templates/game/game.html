<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Caro Game</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
      }

      #board {
        display: grid;
        grid-template-columns: repeat(20, 30px);
        justify-content: center;
        margin-top: 20px;
      }

      .cell {
        width: 30px;
        height: 30px;
        border: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <h2>Game</h2>
    <div id="turn">Turn: X</div>
    <div id="status"></div>
    <div id="board"></div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <script th:inline="javascript">
      /*<![CDATA[*/
      const roomId = /*[[${roomId}]]*/ 0;
      const currentUsername = /*[[${user.username}]]*/ "guest";
      const playerSymbol = /*[[${playerSymbol}]]*/ "";
      const initialTurn = /*[[${currentTurn}]]*/ "X";
      /*]]>*/
    </script>

    <script>
      let board = Array(20)
        .fill(null)
        .map(() => Array(20).fill(null));
      let currentPlayer = initialTurn;
      let winner = null;
      let stompClient = null;

      function connectWS() {
        const socket = new SockJS("/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
          stompClient.subscribe("/topic/game/" + roomId, function (msg) {
            const data = JSON.parse(msg.body);

            if (data.x == null || data.y == null || !data.player) {
              return;
            }

            board[data.x][data.y] = data.player;
            currentPlayer = data.currentTurn || currentPlayer;
            winner = data.winner || winner;

            updateTurn();
            renderBoard();

            if (data.type === "WIN" && data.winner) {
              document.getElementById("status").innerText =
                data.winner + " wins the game!";
            }
          });
        });
      }

      function sendMove(x, y) {
        if (!stompClient || !stompClient.connected) return;
        if (winner) return;
        if (playerSymbol !== currentPlayer) return;
        if (board[x][y]) return;

        stompClient.send(
          "/app/game.move/" + roomId,
          {},
          JSON.stringify({
            roomId: String(roomId),
            x: x,
            y: y,
            sender: currentUsername,
          }),
        );
      }

      function renderBoard() {
        const boardDiv = document.getElementById("board");
        boardDiv.innerHTML = "";

        for (let i = 0; i < 20; i++) {
          for (let j = 0; j < 20; j++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerText = board[i][j] || "";
            cell.onclick = () => sendMove(i, j);
            boardDiv.appendChild(cell);
          }
        }
      }

      function updateTurn() {
        const turnText = winner
          ? "Winner: " + winner
          : "Turn: " + currentPlayer;
        document.getElementById("turn").innerText = turnText;
        document.getElementById("status").innerText = winner
          ? "Your symbol: " + playerSymbol
          : "Your symbol: " +
            playerSymbol +
            (playerSymbol === currentPlayer ? " | Your turn" : " | Opponent's turn");
      }

      connectWS();
      updateTurn();
      renderBoard();
    </script>
  </body>
</html>
